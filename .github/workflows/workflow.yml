name: ms-agendamento CI/CD Pipeline 

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  code-quality-agendamento:
    name: ms-agendamento Linting and Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run spotless check
        run: mvn -B -f ms-agendamento/pom.xml spotless:check

      - name: Run Checkstyle
        run: mvn -B -f ms-agendamento/pom.xml checkstyle:check

      - name: Generate Checkstyle report
        run: mvn -B -f ms-agendamento/pom.xml checkstyle:checkstyle

      - name: Run PMD check
        run: mvn -B -f ms-agendamento/pom.xml pmd:check

      - name: generate PMD report
        run: mvn -B -f ms-agendamento/pom.xml pmd:pmd
      
      - name: Run spotbugs check
        run: mvn -B -f ms-agendamento/pom.xml spotbugs:check

      - name: Generate SpotBugs report
        run: mvn -B -f ms-agendamento/pom.xml spotbugs:spotbugs
  
  test-agendamento:
    needs: [code-quality-agendamento]
    name: ms-agendamento Module Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
  
      - name: Roda os testes do módulo ms-agendamento
        run: mvn -B -f ms-agendamento/pom.xml clean package

      - name: Run E2E tests do módulo ms-agendamento
        run: mvn -B -f ms-agendamento/pom.xml -Ddocker.e2e=true -Dtest=AgendamentoFlowE2ETest test

      - name: Run Code Quality Analysis do módulo ms-agendamento
        run: mvn -B -f ms-agendamento/pom.xml jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ms-agendamento/target/site/jacoco/jacoco.xml
          flags: ms-agendamento
          name: ms-agendamento-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage Report do módulo ms-agendamento
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ms-agendamento/target/site/jacoco/
          retention-days: 1

  build-agendamento:
    needs: [test-agendamento]
    name: ms-agendamento Module Build and Artifact Upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build ms-agendamento module
        run: mvn -B -f ms-agendamento/pom.xml clean package -DskipTests
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ms-agendamento-jar
          path: ms-agendamento/target/*.jar
          retention-days: 1

